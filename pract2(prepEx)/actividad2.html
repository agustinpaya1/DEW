<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Selección de Canciones - Hard Rock</title>
</head>
<body>
    <h1 class="display-5">Formulario de Selección de Canciones de Hard Rock</h1>

    <form action="https://httpbin.org/get" method="GET">
        
        <table border="1">
            <caption>Lista de reproducción</caption>
            <tr>
                <td>Back in Black - AC/DC <input type="checkbox" name="songs" value="99742fa3cefa"></td>
                <td>Smoke on the Water <input type="checkbox" name="songs" value="a1b2c3d4e5f6"></td>
                <td>Sweet Child O' Mine <input type="checkbox" name="songs" value="f6e5d4c3b2a1"></td>
                <td>Livin' on a Prayer <input type="checkbox" name="songs" value="1234567890ab"></td>
            </tr>
            </table>

        <p>
            <input type="checkbox" name="play_now" id="reproducir">
            <label for="reproducir">Reproducir automáticamente</label>
        </p>

        <div>
            <input type="image" src="https://upload.wikimedia.org/wikipedia/commons/4/4b/Play_Button_-_Media_Player_-_Green.svg" 
                   alt="Enviar formulario" width="50">
            
            <br><br>
            
            <input type="reset" value="Borrar selección">
        </div>

    </form>
</body>
</html>

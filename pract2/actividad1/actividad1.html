<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Registro</title>
</head>
<body>
    <h2>Formulario de Registro</h2>
    <form action="https://httpbin.org/post" method="POST">
        
        <p>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required> </p>
        <p>
            <label for="apellido1">Primer Apellido:</label>
            <input type="text" id="apellido1" name="apellido1" required> </p>
        <p>
            <label for="apellido2">Segundo Apellido:</label>
            <input type="text" id="apellido2" name="apellido2" required> </p>
        <p>
            <label for="username">Nombre de Usuario:</label>
            <input type="text" id="username" name="username" required> </p>
        <p>
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" required> </p>
        <p>
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required> </p>
        <p>
            <label for="password_confirm">Reescribir Contraseña:</label>
            <input type="password" id="password_confirm" name="password_confirm" required> </p>
        <p>
            <label for="fecha_nac">Fecha de Nacimiento:</label>
            <input type="date" id="fecha_nac" name="fecha_nacimiento">
        </p>
        
        <p>
            <label for="genero">Género:</label>
            <select id="genero" name="genero">
                <option value="Masculino">Masculino</option> <option value="Femenino">Femenino</option>
                <option value="Otro">Otro</option>
            </select>
        </p>

        <p>
            <label>Intereses:</label>
            <input type="checkbox" name="intereses" value="Programacion"> Programación
            <input type="checkbox" name="intereses" value="Diseno"> Diseño
            <input type="checkbox" name="intereses" value="Seguridad"> Seguridad Informática
        </p>

        <p>
            <label>Tipo de Usuario:</label>
            <input type="radio" name="tipo_usuario" value="Estudiante" required> Estudiante
            <input type="radio" name="tipo_usuario" value="Profesor" required> Profesor
            <input type="radio" name="tipo_usuario" value="Administrativo" required> Administrativo
        </p>

        <p>
            <label for="universidad">Universidad:</label>
            <select id="universidad" name="universidad" required>
                <optgroup label="Valencia">
                    <option value="UV">Universitat de València</option>
                    <option value="UPV">Universitat Politècnica de València</option>
                </optgroup>
                <optgroup label="Alicante">
                    <option value="UA">Universitat d'Alacant</option>
                    <option value="UMH">Universitat Miguel Hernández</option>
                </optgroup>
                <optgroup label="Castellón">
                    <option value="UJI">Universitat Jaume I</option>
                </optgroup>
            </select>
        </p>

        <p>
            <label for="foto">Subir Foto:</label>
            <input type="file" id="foto" name="foto" accept="image/*" required>
        </p>

        <p>
            <label for="comentarios">Comentarios:</label><br>
            <textarea id="comentarios" name="comentarios" cols="50" rows="6"></textarea>
        </p>

        <p>
            <input type="submit" value="Registrarse">
            <input type="reset" value="Borrar">
        </p>
    </form>
</body>
</html>
